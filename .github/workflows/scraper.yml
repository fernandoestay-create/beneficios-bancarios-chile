name: Scraping Mensual - Beneficios y Bencinas

on:
  schedule:
    # Días 1, 2, 3 y 4 de cada mes a las 5 AM UTC (2 AM Chile)
    # Se ejecuta 4 días seguidos para asegurar que capture los datos del nuevo mes
    - cron: '0 5 1-4 * *'
  workflow_dispatch:  # Permite ejecución manual desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml playwright openai pinecone python-dotenv
          playwright install chromium

      - name: Run scrapers (restaurantes + bencinas)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_HOST: ${{ secrets.PINECONE_HOST }}
          PINECONE_INDEX: beneficios-bancarios
        run: python scrapers.py

      - name: Upload to Pinecone
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_HOST: ${{ secrets.PINECONE_HOST }}
          PINECONE_INDEX: beneficios-bancarios
        run: python upload_pinecone.py

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add beneficios.json beneficios.csv bencinas.json
          git diff --staged --quiet || git commit -m "🔄 Actualizar beneficios y bencinas $(date +%Y-%m-%d)"
          git push
