services:
  - type: web
    name: api-beneficios-chile
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENV
        value: us-east-1
      - key: PINECONE_INDEX
        value: beneficios-bancarios
      - key: PINECONE_HOST
        value: beneficios-bancarios-96gaajy.svc.aped-4627-b74a.pinecone.io

  - type: web
    name: whatsapp-bot-beneficios
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn whatsapp_bot:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
